<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hall Pass Log – Promesa Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f0f4ff;padding:16px;color:#222;}
.top{display:flex;align-items:center;gap:12px;margin-bottom:4px;}
.top img{height:52px;width:auto;}
.top-text h1{font-size:20px;font-weight:bold;color:#0d2d6e;}
.top-text .sub2{font-size:13px;color:#666;}
.datebadge{background:#dbeafe;color:#1e40af;font-size:12px;font-weight:bold;padding:3px 12px;border-radius:20px;margin-left:auto;white-space:nowrap;}
.grade-bar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;}
.grade-btn{background:#fff;border:1.5px solid #d1d5db;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:bold;cursor:pointer;color:#444;}
.grade-btn:hover{border-color:#2563eb;color:#2563eb;}
.grade-btn.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;flex:1;min-width:90px;text-align:center;}
.stat-label{font-size:11px;color:#999;margin-bottom:2px;}
.stat-val{font-size:26px;font-weight:bold;color:#222;}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
input[type=text]{border:1px solid #ccc;border-radius:6px;padding:8px 10px;font-size:14px;width:160px;}
select{border:1px solid #ccc;border-radius:6px;padding:8px 10px;font-size:14px;background:#fff;color:#222;}
.btn-send{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:14px;font-weight:bold;cursor:pointer;}
.btn-send:hover{background:#1d4ed8;}
.btn-clear{background:#fff;color:#999;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:13px;cursor:pointer;margin-left:auto;}
.btn-clear:hover{background:#fee2e2;color:#b91c1c;}
.table-wrap{background:#fff;border:1px solid #ddd;border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{background:#f3f4f6;color:#555;font-size:12px;font-weight:bold;padding:9px 10px;text-align:left;border-bottom:1px solid #e5e7eb;}
td{padding:9px 10px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.warn td{background:#fffbeb;}
.badge-out{background:#fef3c7;color:#92400e;font-size:12px;font-weight:bold;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-back{background:#dcfce7;color:#166534;font-size:12px;font-weight:bold;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.grade-tag{background:#ede9fe;color:#5b21b6;font-size:11px;font-weight:bold;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.btn-back{background:#fff;border:1px solid #ccc;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;}
.btn-back:hover{background:#f0fdf4;border-color:#86efac;}
.btn-del{background:none;border:none;color:#ccc;font-size:15px;cursor:pointer;padding:2px 5px;border-radius:4px;}
.btn-del:hover{color:#dc2626;background:#fee2e2;}
.warn-txt{color:#b45309;font-weight:bold;}
.empty{text-align:center;color:#bbb;font-size:14px;padding:28px 0;}
</style>
</head>

CiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooAKKKKACiiigAooooA//9k=';
document.getElementById('logo').src = 'data:image/png;base64,' + LOGO_B64;

var grades = ['Pre-K','Kinder','1st','2nd','3rd','4th','5th','6th'];
var entries = [];
var activeGrade = 'All';

function pad(n){return('0'+n).slice(-2);}
function fmt(d){var h=d.getHours(),m=d.getMinutes(),ap=h>=12?'pm':'am';h=h%12||12;return h+':'+pad(m)+' '+ap;}
function mins(a,b){return Math.round((b-a)/60000);}
function dur(a,b){var m=mins(a,b);return m<1?'< 1 min':m+' min';}

function setDate(){
  var d=new Date();
  document.getElementById('datebadge').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function buildGradeBar(){
  var bar=document.getElementById('gradeBar');
  var sel=document.getElementById('gradeSelect');
  bar.innerHTML='<button class="grade-btn active" onclick="filterGrade(\'All\',this)">All Grades</button>';
  sel.innerHTML='';
  grades.forEach(function(g){
    var btn=document.createElement('button');
    btn.className='grade-btn';
    btn.textContent=g;
    btn.setAttribute('onclick','filterGrade(\''+g+'\',this)');
    bar.appendChild(btn);
    var opt=document.createElement('option');
    opt.value=g;opt.textContent=g;
    sel.appendChild(opt);
  });
}

function filterGrade(g,el){
  activeGrade=g;
  document.querySelectorAll('.grade-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  if(g!=='All'){document.getElementById('gradeSelect').value=g;}
  render();
}

function updateStats(){
  var filtered=activeGrade==='All'?entries:entries.filter(function(e){return e.grade===activeGrade;});
  var out=filtered.filter(function(e){return!e.back;}).length;
  var done=filtered.filter(function(e){return e.back;});
  var avg=done.length?Math.round(done.reduce(function(s,e){return s+mins(e.out,e.back);},0)/done.length):null;
  document.getElementById('s-out').textContent=out;
  document.getElementById('s-total').textContent=filtered.length;
  document.getElementById('s-avg').textContent=avg!==null?avg:'—';
}

function render(){
  var tb=document.getElementById('logBody');
  var filtered=activeGrade==='All'?entries:entries.filter(function(e){return e.grade===activeGrade;});
  if(!filtered.length){
    tb.innerHTML='<tr><td colspan="8" class="empty">No trips yet — select a grade, enter a name, and click Send Out.</td></tr>';
    updateStats();return;
  }
  var now=new Date();
  var html='';
  var shown=filtered.slice().reverse();
  shown.forEach(function(e){
    var i=entries.indexOf(e);
    var m=e.back?0:mins(e.out,now);
    var warn=!e.back&&m>=10;
    var d=e.back?dur(e.out,e.back):dur(e.out,now);
    html+='<tr class="'+(warn?'warn':'')+'"><td><span class="grade-tag">'+e.grade+'</span></td><td><b>'+e.name+'</b></td><td>'+e.dest+'</td><td>'+fmt(e.out)+'</td><td>'+(e.back?fmt(e.back):'<span style="color:#ccc">—</span>')+'</td><td class="'+(warn?'warn-txt':'')+'">'+d+(warn?' ⚠️':'')+'</td><td>'+(e.back?'<span class="badge-back">back</span>':'<span class="badge-out">out</span>')+'</td><td style="display:flex;gap:5px;">'+(!e.back?'<button class="btn-back" onclick="markBack('+i+')">Mark Back</button>':'')+'<button class="btn-del" onclick="del('+i+')" title="Remove">✕</button></td></tr>';
  });
  tb.innerHTML=html;
  updateStats();
}

function sendOut(){
  var el=document.getElementById('nameInput');
  var name=el.value.trim();
  if(!name){el.style.borderColor='red';setTimeout(function(){el.style.borderColor='#ccc';},1200);return;}
  var grade=document.getElementById('gradeSelect').value;
  var dest=document.getElementById('destSelect').value;
  entries.push({name:name,grade:grade,dest:dest,out:new Date(),back:null});
  el.value='';el.focus();render();
}

function markBack(i){entries[i].back=new Date();render();}
function del(i){entries.splice(i,1);render();}
function clearAll(){
  if(!entries.length)return;
  if(confirm('Clear all entries?')){entries=[];render();}
}

document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter')sendOut();});
setDate();
buildGradeBar();
render();
setInterval(render,30000);
</script>
